# ============================================================
# alembic.ini – Alembic migration configuration
# NLU-EduPath / craw-data
# ============================================================
# Tham khảo: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Đường dẫn đến thư mục chứa env.py, script.py.mako và versions/
script_location = db/migrations

# Định dạng tên file migration (timestamp + slug)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Thêm thư mục gốc vào sys.path để import models
prepend_sys_path = .

# Timezone cho timestamp trong tên file
timezone = Asia/Ho_Chi_Minh

# ============================================================
# DATABASE URL
# Được override bởi env.py qua biến môi trường DATABASE_URL
# Giá trị ở đây chỉ là fallback khi chạy alembic trực tiếp
# ============================================================
sqlalchemy.url = postgresql://crawler:crawler_pass@localhost:5432/nlu_edupath

# ============================================================
# LOGGING
# ============================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
