[pytest]
# ============================================================
# pytest.ini – Cấu hình pytest cho NLU-EduPath Crawl Data
# ============================================================

# Thư mục chứa test files
testpaths = tests

# Pattern file test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers được đăng ký (tránh warning "PytestUnknownMarkWarning")
markers =
    unit: Unit tests – không cần DB/Redis/Network
    integration: Integration tests – cần DB thật đang chạy
    slow: Slow tests – Playwright, crawl thật, có thể mất nhiều phút

# Mặc định chỉ chạy unit tests (không chạy integration/slow)
# Để chạy tất cả: pytest -m ""
# Để chạy integration: pytest -m integration
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not integration and not slow"

# Log level khi chạy test
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(name)s] %(levelname)s: %(message)s
log_cli_date_format = %H:%M:%S

# Timeout cho mỗi test (giây) – cần pytest-timeout
# timeout = 30

# Minimum version
minversion = 8.0
